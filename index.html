/* ============================================
   DOKODARTS? — Mobile-first Darts Portal
   Atmospheric, hand-drawn, mystery aesthetic
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Caesar+Dressing&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700&family=Klee+One:wght@400;600&display=swap');

:root {
  /* Color palette — derived from the splash mockup */
  --bg-mist:        #8a9aa6;       /* Foggy mid-tone */
  --bg-stone:       #6a7984;       /* Wet stone */
  --bg-deep:        #3d4853;       /* Deep slate */
  --ink:            #0f1620;       /* Near-black ink */
  --ink-soft:       #1d2734;       /* Charcoal navy (circles) */
  --paper:          #f5f1e8;       /* Aged cream */
  --paper-soft:     #e8e2d1;       /* Faded paper */
  --teal:           #5fb8b3;       /* Question-mark teal */
  --teal-bright:    #7dd4cf;       /* Hover teal */
  --teal-deep:      #2d8a85;       /* Pressed teal */
  --rust:           #b85543;       /* Accent rust (errors, hearts) */
  --gold:           #c9a86b;       /* Highlights */

  /* Layout */
  --max-w: 480px;
  --topbar-h: 64px;
  --bottomnav-h: 88px;
  --radius-sm: 6px;
  --radius-md: 14px;
  --radius-lg: 28px;

  /* Shadows */
  --shadow-soft: 0 4px 20px -8px rgba(15, 22, 32, 0.4);
  --shadow-deep: 0 12px 36px -12px rgba(15, 22, 32, 0.55);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
*::before, *::after { box-sizing: border-box; }

html, body {
  width: 100%;
  min-height: 100%;
  font-family: 'Shippori Mincho', 'Cormorant Garamond', serif;
  color: var(--ink);
  background: var(--bg-stone);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overscroll-behavior: none;
}

body::before {
  /* Subtle vignette + film grain overlay */
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at center, transparent 30%, rgba(15, 22, 32, 0.25) 100%),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
  pointer-events: none;
  z-index: 1;
}

button, input, select, textarea { font-family: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* App container — centers on wide screens */
#app {
  position: relative;
  z-index: 2;
  max-width: var(--max-w);
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: splashFade 0.45s ease-out forwards;
  animation-delay: 1.5s;
}

.splash::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(15,22,32,0.15) 100%);
}

@keyframes splashFade {
  0% { opacity: 1; visibility: visible; }
  99% { opacity: 0; visibility: visible; }
  100% { opacity: 0; visibility: hidden; pointer-events: none; }
}

/* ============================================
   TOP BAR
   ============================================ */
.topbar {
  height: var(--topbar-h);
  display: grid;
  grid-template-columns: 48px 1fr 48px;
  align-items: center;
  padding: 12px 16px 8px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(180deg,
    rgba(138, 154, 166, 0.0) 0%,
    rgba(138, 154, 166, 0.0) 70%,
    rgba(138, 154, 166, 0.0) 100%);
}

.topbar::after {
  /* Hand-drawn divider line */
  content: '';
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 0;
  height: 1px;
  background: var(--ink);
  opacity: 0.5;
}

.topbar-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-soft);
  transition: transform 0.2s, color 0.2s;
}

.topbar-btn:hover { color: var(--teal-deep); transform: scale(1.05); }
.topbar-btn svg { width: 28px; height: 28px; stroke-width: 1.5; }

.topbar-title {
  font-family: 'Caesar Dressing', 'Shippori Mincho', serif;
  font-size: 32px;
  text-align: center;
  color: var(--ink);
  letter-spacing: 0.08em;
  user-select: none;
  text-shadow: 0 2px 8px rgba(245, 241, 232, 0.3);
}

.topbar-title .accent { color: var(--teal); }

/* ============================================
   SCREEN
   ============================================ */
.screen {
  flex: 1;
  padding: 20px 20px calc(var(--bottomnav-h) + 24px);
  display: flex;
  flex-direction: column;
  gap: 24px;
  animation: screenFade 0.4s ease-out;
}

@keyframes screenFade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================
   SEARCH BAR
   ============================================ */
.search-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
}

.search-bar svg {
  width: 36px;
  height: 36px;
  color: var(--ink-soft);
  flex-shrink: 0;
  stroke-width: 1.5;
}

.search-bar input {
  flex: 1;
  height: 44px;
  padding: 0 14px;
  background: rgba(245, 241, 232, 0.85);
  border: 1px solid var(--ink-soft);
  border-radius: 2px;
  font-size: 16px;
  font-family: 'Shippori Mincho', serif;
  outline: none;
  box-shadow: var(--shadow-soft);
  transition: background 0.2s, border-color 0.2s;
}

.search-bar input:focus {
  background: var(--paper);
  border-color: var(--teal);
}

/* ============================================
   HOME — THREE CIRCLES
   ============================================ */
.circle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 28px 16px;
  padding: 16px 8px;
  margin-top: 8px;
}

.circle-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.circle-btn:active { transform: scale(0.94); }
.circle-btn:hover .circle-shape { box-shadow: var(--shadow-deep); }

.circle-shape {
  width: clamp(140px, 38vw, 180px);
  height: clamp(140px, 38vw, 180px);
  border-radius: 50%;
  background: var(--ink-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-soft);
  position: relative;
  transition: box-shadow 0.3s, transform 0.3s;
}

/* Hand-drawn underline below icon, inside circle */
.circle-shape::after {
  content: '';
  position: absolute;
  bottom: 30%;
  left: 18%;
  right: 18%;
  height: 1px;
  background: var(--paper);
  opacity: 0.85;
}

.circle-shape svg {
  width: 58%;
  height: 58%;
  color: var(--paper);
  stroke-width: 1.5;
  transform: translateY(-8%);
}

.circle-label {
  font-family: 'Shippori Mincho', serif;
  font-size: 22px;
  color: var(--paper);
  position: absolute;
  bottom: 12%;
  letter-spacing: 0.1em;
  font-weight: 500;
}

/* First circle (駅) spans both columns, centered */
.circle-btn:nth-child(1) {
  grid-column: 1 / 3;
  align-items: center;
}

/* ============================================
   BOTTOM NAV
   ============================================ */
.bottomnav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-w);
  height: var(--bottomnav-h);
  background: var(--ink-soft);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  justify-items: center;
  z-index: 100;
  box-shadow: 0 -8px 24px -8px rgba(15, 22, 32, 0.4);
}

.bottomnav-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--paper);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-soft);
  transition: transform 0.2s, background 0.2s, color 0.2s;
}

.bottomnav-btn svg { width: 28px; height: 28px; stroke-width: 1.8; }
.bottomnav-btn.active { background: var(--teal); color: var(--paper); }
.bottomnav-btn:hover { transform: scale(1.08); }
.bottomnav-btn:active { transform: scale(0.92); }

/* ============================================
   SECTION HEADER (page title)
   ============================================ */
.section-header {
  text-align: center;
  padding: 8px 0 16px;
  position: relative;
}

.section-header h2 {
  font-family: 'Shippori Mincho', serif;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--ink);
}

.section-header .subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  letter-spacing: 0.3em;
  color: var(--ink-soft);
  opacity: 0.7;
  margin-top: 4px;
  text-transform: uppercase;
}

.section-header::after {
  content: '';
  display: block;
  width: 60px;
  height: 1px;
  background: var(--ink);
  margin: 12px auto 0;
  opacity: 0.6;
}

/* ============================================
   FORM ELEMENTS
   ============================================ */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 18px;
}

.form-group label {
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--ink);
}

.form-group select,
.form-group input[type="text"],
.form-group input[type="email"],
.form-group textarea {
  height: 44px;
  padding: 0 14px;
  background: rgba(245, 241, 232, 0.85);
  border: 1px solid var(--ink-soft);
  border-radius: 2px;
  font-size: 15px;
  font-family: 'Shippori Mincho', serif;
  outline: none;
  width: 100%;
}

.form-group textarea {
  height: auto;
  min-height: 120px;
  padding: 12px 14px;
  resize: vertical;
}

.form-group select:focus,
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--teal);
  background: var(--paper);
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  padding: 8px 14px;
  background: rgba(245, 241, 232, 0.6);
  border: 1px solid var(--ink-soft);
  border-radius: 999px;
  font-size: 13px;
  font-family: 'Shippori Mincho', serif;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}

.chip:hover { background: var(--paper); }

.chip.active {
  background: var(--ink-soft);
  color: var(--paper);
  border-color: var(--ink);
}

/* Toggle (学割) */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(245, 241, 232, 0.7);
  border: 1px solid var(--ink-soft);
  border-radius: 2px;
}

.toggle {
  position: relative;
  width: 48px;
  height: 26px;
  background: var(--bg-stone);
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.25s;
}

.toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  background: var(--paper);
  border-radius: 50%;
  transition: left 0.25s;
}

.toggle.on { background: var(--teal); }
.toggle.on::after { left: 25px; }

/* Buttons */
.btn-primary {
  width: 100%;
  height: 48px;
  background: var(--ink-soft);
  color: var(--paper);
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.15em;
  border: 1px solid var(--ink);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: none;
}

.btn-primary:hover { background: var(--ink); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  width: 100%;
  height: 44px;
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--ink-soft);
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-secondary:hover { background: rgba(245, 241, 232, 0.6); }

.btn-teal {
  background: var(--teal);
  color: var(--paper);
  border-color: var(--teal-deep);
}

.btn-teal:hover { background: var(--teal-bright); }

/* ============================================

   ============================================ */
.shop-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.shop-card {
  background: rgba(245, 241, 232, 0.92);
  border: 1px solid var(--ink-soft);
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  box-shadow: var(--shadow-soft);
}

.shop-card:hover {
  transform: translateX(2px);
  border-color: var(--teal);
  background: var(--paper);
}

.shop-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--ink-soft);
  transition: background 0.2s;
}

.shop-card:hover::before { background: var(--teal); }

.shop-card-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}

.shop-card-area {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--teal-deep);
  padding: 2px 8px;
  border: 1px solid var(--teal-deep);
}

.shop-card-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 8px;
}

.shop-card-meta {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.6;
}

.shop-card-meta > div {
  display: flex;
  gap: 8px;
  padding: 2px 0;
}

.shop-card-meta .label {
  flex-shrink: 0;
  width: 64px;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--bg-stone);
  font-weight: 600;
  padding-top: 1px;
}

.shop-card-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--rust);
}

.shop-card-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 2px;
  font-family: 'Shippori Mincho', serif;
  letter-spacing: 0.1em;
  background: var(--ink-soft);
  color: var(--paper);
}

.badge.gold { background: var(--gold); color: var(--ink); }
.badge.teal { background: var(--teal-deep); }
.badge.rust { background: var(--rust); }

/* ============================================
   SHOP DETAIL
   ============================================ */
.detail-section {
  background: rgba(245, 241, 232, 0.92);
  border: 1px solid var(--ink-soft);
  padding: 18px 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-soft);
}

.detail-area-tag {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  letter-spacing: 0.3em;
  color: var(--teal-deep);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.detail-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 14px;
}

.detail-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.fav-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 1px solid var(--ink-soft);
  border-radius: 2px;
  color: var(--ink-soft);
  transition: all 0.2s;
}

.fav-btn svg { width: 24px; height: 24px; stroke-width: 1.8; }
.fav-btn.active { background: var(--rust); color: var(--paper); border-color: var(--rust); }
.fav-btn:hover { border-color: var(--rust); color: var(--rust); }
.fav-btn.active:hover { color: var(--paper); }

.detail-row {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px dashed rgba(15, 22, 32, 0.15);
  font-size: 14px;
  line-height: 1.6;
}

.detail-row:last-child { border-bottom: none; }
.detail-row .label {
  font-weight: 600;
  color: var(--bg-stone);
  letter-spacing: 0.05em;
  font-size: 12px;
  padding-top: 2px;
}

/* ============================================
   MENU DRAWER
   ============================================ */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15, 22, 32, 0.6);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.drawer-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}

.drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: min(80%, 320px);
  height: 100vh;
  height: 100dvh;
  background: var(--ink-soft);
  z-index: 201;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0.0, 0.2, 1);
  display: flex;
  flex-direction: column;
  padding: 32px 24px;
  box-shadow: -12px 0 36px -12px rgba(0,0,0,0.5);
}

.drawer.open { transform: translateX(0); }

.drawer-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(245, 241, 232, 0.2);
}

.drawer-header h3 {
  font-family: 'Caesar Dressing', serif;
  font-size: 24px;
  color: var(--paper);
  letter-spacing: 0.08em;
}

.drawer-close {
  color: var(--paper);
  font-size: 28px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.drawer-items {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.drawer-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 12px;
  color: var(--paper);
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  letter-spacing: 0.1em;
  border-left: 2px solid transparent;
  transition: all 0.2s;
  cursor: pointer;
  border-radius: 0;
}

.drawer-item:hover {
  background: rgba(245, 241, 232, 0.08);
  border-left-color: var(--teal);
  padding-left: 16px;
}

.drawer-item svg { width: 22px; height: 22px; stroke-width: 1.5; opacity: 0.9; }

/* ============================================
   ACCOUNT
   ============================================ */
.profile-photo {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--ink-soft);
  margin: 8px auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--paper);
  cursor: pointer;
  overflow: hidden;
  border: 2px solid var(--ink);
  position: relative;
  box-shadow: var(--shadow-soft);
}

.profile-photo svg { width: 48%; height: 48%; }
.profile-photo img { width: 100%; height: 100%; object-fit: cover; }
.profile-photo::after {
  content: '＋';
  position: absolute;
  bottom: 4px;
  right: 4px;
  width: 28px;
  height: 28px;
  background: var(--teal);
  color: var(--paper);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  border: 2px solid var(--paper);
}

.profile-photo input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.account-name-display {
  text-align: center;
  font-family: 'Shippori Mincho', serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--ink);
}

.account-card-display {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--ink-soft);
  margin-bottom: 24px;
  opacity: 0.8;
}

.setup-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

/* ============================================
   SCORE INPUT (favorite shop detail)
   ============================================ */
.score-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--ink-soft);
}

.score-tab {
  flex: 1;
  padding: 12px 8px;
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--bg-stone);
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
}

.score-tab.active {
  color: var(--ink);
  border-bottom-color: var(--teal);
}

.score-input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}

.score-input-row input {
  flex: 1;
  height: 48px;
  padding: 0 14px;
  background: rgba(245, 241, 232, 0.85);
  border: 1px solid var(--ink-soft);
  font-size: 16px;
  font-family: 'Shippori Mincho', serif;
  outline: none;
  text-align: center;
  letter-spacing: 0.05em;
}

.score-input-row button {
  width: 100px;
  background: var(--ink-soft);
  color: var(--paper);
  font-family: 'Shippori Mincho', serif;
  font-weight: 600;
  letter-spacing: 0.1em;
}

.score-ranking {
  background: rgba(245, 241, 232, 0.85);
  border: 1px solid var(--ink-soft);
  padding: 14px;
}

.score-ranking h4 {
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  letter-spacing: 0.15em;
  margin-bottom: 12px;
  color: var(--ink);
  border-bottom: 1px dashed var(--ink-soft);
  padding-bottom: 6px;
}

.score-item {
  display: grid;
  grid-template-columns: 28px 1fr 80px;
  gap: 8px;
  align-items: center;
  padding: 6px 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  border-bottom: 1px dashed rgba(15, 22, 32, 0.1);
}

.score-item:last-child { border-bottom: none; }
.score-rank { font-weight: 700; color: var(--teal-deep); }
.score-rank.gold { color: var(--gold); }
.score-value { text-align: right; font-weight: 700; color: var(--ink); }

/* ============================================
   EMPTY STATES
   ============================================ */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--ink-soft);
  font-family: 'Shippori Mincho', serif;
}

.empty-state svg {
  width: 64px;
  height: 64px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-state h3 {
  font-size: 18px;
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 13px;
  opacity: 0.7;
  line-height: 1.7;
}

/* ============================================
   BACK BUTTON
   ============================================ */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  color: var(--ink-soft);
  padding: 8px 12px;
  background: rgba(245, 241, 232, 0.7);
  border: 1px solid var(--ink-soft);
  cursor: pointer;
  margin-bottom: 12px;
  letter-spacing: 0.08em;
  transition: all 0.2s;
}

.back-btn:hover { background: var(--paper); }
.back-btn::before { content: '←'; font-size: 18px; line-height: 1; }

/* ============================================
   UTILITIES
   ============================================ */
.hidden { display: none !important; }

.results-count {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-style: italic;
  color: var(--ink-soft);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.note {
  font-size: 12px;
  color: var(--bg-stone);
  font-style: italic;
  line-height: 1.6;
  padding: 8px 12px;
  background: rgba(245, 241, 232, 0.5);
  border-left: 2px solid var(--bg-stone);
  margin-top: 8px;
}

/* ============================================
   RESPONSIVE — slight desktop refinement
   ============================================ */
@media (min-width: 600px) {
  body {
    background-color: var(--bg-deep);
  }
  #app {
    box-shadow: 0 0 60px -12px rgba(0,0,0,0.6);
  }
}

/* 非ホーム画面: 背景の DOKODARTS 透かしを濃いベール越しに */
body[data-screen]:not([data-screen="home"])::before {
  background:
    linear-gradient(180deg, rgba(15, 22, 32, 0.35) 0%, rgba(15, 22, 32, 0.55) 100%),

}

body[data-screen]:not([data-screen="home"]) main.screen {
  background:

  margin: 0;
  padding: 24px 18px calc(var(--bottomnav-h) + 32px);
  border-top: 1px solid rgba(29, 39, 52, 0.3);
  position: relative;
  z-index: 2;
  box-shadow: 0 -8px 30px -10px rgba(15, 22, 32, 0.45);
}

body[data-screen]:not([data-screen="home"]) main.screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(90deg, rgba(29, 39, 52, 0.015) 0 1px, transparent 1px 4px),
    repeating-linear-gradient(0deg, rgba(29, 39, 52, 0.01) 0 1px, transparent 1px 3px);
  pointer-events: none;
  z-index: 0;
}

body[data-screen]:not([data-screen="home"]) main.screen > * {
  position: relative;
  z-index: 1;
}

/* 非ホーム画面: ショップカードは完全不透明＋立体感 */
body[data-screen]:not([data-screen="home"]) .shop-card {
  background: #ffffff;
  box-shadow: 0 4px 14px -6px rgba(15, 22, 32, 0.35), 0 1px 3px rgba(15, 22, 32, 0.1);
}

body[data-screen]:not([data-screen="home"]) .shop-card:hover {
  background: var(--paper);
}

/* 非ホーム画面: 戻るボタンを完全不透明に */
body[data-screen]:not([data-screen="home"]) .back-btn {
  background: var(--paper);
  box-shadow: 0 2px 8px -4px rgba(15, 22, 32, 0.3);
}

/* 非ホーム画面: フォーム要素を完全不透明に */
body[data-screen]:not([data-screen="home"]) .search-bar input,
body[data-screen]:not([data-screen="home"]) .form-group select,
body[data-screen]:not([data-screen="home"]) .form-group input[type="text"],
body[data-screen]:not([data-screen="home"]) .form-group input[type="email"],
body[data-screen]:not([data-screen="home"]) .form-group textarea {
  background: #ffffff;
}

body[data-screen]:not([data-screen="home"]) .form-group .toggle-row,
body[data-screen]:not([data-screen="home"]) .toggle-row {
  background: rgba(255, 255, 255, 0.9);
}

body[data-screen]:not([data-screen="home"]) .results-count {
  color: var(--ink-soft);
  font-weight: 500;
  font-style: normal;

body[data-screen]:not([data-screen="home"]) .note {
  background: rgba(255, 255, 255, 0.6);

function estimatePrice(shop, hours, isWeekend = false) {
  // 3時間パックがある場合、3時間以上なら活用
  if (shop.min3hPack && hours >= 3) {
    const packBase = isWeekend ? shop.min3hPack * 1.2 : shop.min3hPack;
    const extra = hours > 3 ? (hours - 3) * (shop.minHourly || 600) : 0;
    return Math.round(packBase + extra);
  }
  // 時間制
  if (shop.minHourly) {
    const base = isWeekend ? shop.minHourly * 1.1 : shop.minHourly;
    return Math.round(base * hours);
  }
  return null; // 料金不明

function saveState() {
  try {
    localStorage.setItem('dokodarts_favorites', JSON.stringify(state.favorites));
    localStorage.setItem('dokodarts_account', JSON.stringify(state.account));
  } catch (e) { console.warn('localStorage unavailable', e); }
}

function loadState() {
  try {
    const fav = localStorage.getItem('dokodarts_favorites');
    if (fav) state.favorites = JSON.parse(fav);
    const acc = localStorage.getItem('dokodarts_account');
    if (acc) state.account = { ...state.account, ...JSON.parse(acc) };
  } catch (e) { console.warn('localStorage read failed', e); }
}

function $(selector, parent = document) { return parent.querySelector(selector); }
function escHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({

  }[m]));
}

function toggleFavorite(shopId) {
  const idx = state.favorites.findIndex(f => f.shopId === shopId);
  if (idx >= 0) {
    state.favorites.splice(idx, 1);
  } else {
    state.favorites.push({ shopId, scores: { '01': [], 'cricket': [], 'countup': [] } });
  }
  saveState();
}

function addScore(shopId, gameType, score) {
  let fav = state.favorites.find(f => f.shopId === shopId);
  if (!fav) {
    fav = { shopId, scores: { '01': [], 'cricket': [], 'countup': [] } };
    state.favorites.push(fav);
  }
  if (!fav.scores[gameType]) fav.scores[gameType] = [];
  fav.scores[gameType].push({ value: Number(score), date: new Date().toISOString() });
  saveState();
}

          `).join('')}

          ${DAYS.map(d => `

                 onclick="toggleDay('${d}')">${d}</div>
          `).join('')}
        </div>
      </div>

        <label>料金上限（円）</label>
        <input type="text" placeholder="例: 2000" value="${c.maxPrice ?? ''}"
               oninput="state.cond.maxPrice = this.value ? Number(this.value.replace(/\\D/g,'')) : null" />
      </div>
      <div class="toggle-row">
        <span>学生料金あり</span>
        <div class="toggle ${c.student ? 'on' : ''}"
             onclick="state.cond.student=!state.cond.student; render()"></div>
      </div>
      <div class="toggle-row" style="margin-top:10px">
        <span>パックプランあり</span>
        <div class="toggle ${c.pack ? 'on' : ''}"
             onclick="state.cond.pack=!state.cond.pack; render()"></div>
      </div>
      <button class="btn-primary" style="margin-top:8px" onclick="searchByCondition()">この条件で検索</button>
      <p class="note">複数の条件を同時に指定できます。条件に合致した店舗のうち、料金が安い順に表示します。</p>
    </main>
    ${renderBottomNav()}
  `;
}

function toggleDay(d) {
  const i = state.cond.days.indexOf(d);
  if (i >= 0) state.cond.days.splice(i, 1);
  else state.cond.days.push(d);
  render();
}

function searchByCondition() {
  const c = state.cond;
  let r = SHOPS.slice();

  if (c.area) r = r.filter(s => s.area === c.area);
  if (c.student) r = r.filter(s => s.hasStudent);
  if (c.pack) r = r.filter(s => s.hasPack);

  // 入店時間帯で営業中の店舗のみ
  if (c.entryHour !== null && c.entryHour !== undefined) {
    r = r.filter(s => {
      const open = s.openHour;
      const close = s.closeHour;
      // closeHour > 24 は翌日深夜
      return c.entryHour >= open && c.entryHour < close;
    });
  }

  // 価格推定
  r = r.map(s => {
    const isWknd = c.days.some(d => d === '土' || d === '日' || d === '祝');
    const est = estimatePrice(s, c.stayHours, isWknd);
    return { ...s, _est: est };
  }).filter(s => s._est !== null);

  if (c.maxPrice) {
    r = r.filter(s => s._est <= c.maxPrice);
  }

  r.sort((a, b) => a._est - b._est);

  // 条件のサマリー
  const labels = [];
  if (c.area) labels.push(c.area);
  labels.push(`${c.stayHours}時間`);
  if (c.student) labels.push('学生');
  if (c.pack) labels.push('パック');
  if (c.maxPrice) labels.push(`¥${c.maxPrice}以内`);

  showResults(`条件検索: ${labels.join(' / ')}`, r);
}

function searchByName(name) {
  if (!name || !name.trim()) return;
  const q = name.trim().toLowerCase();
  const results = SHOPS.filter(s =>
    s.name.toLowerCase().includes(q) || s.area.toLowerCase().includes(q));
  showResults(`「${name}」の検索結果`, results);
}

function renderResults() {
  const list = state.results;

      </div>

  return `

      <div class="shop-card-header">
        <span class="shop-card-area">${escHTML(shop.area)}</span>
        ${shop._est ? `<span class="shop-card-price">¥${shop._est.toLocaleString()}</span>` : ''}

        <div><span class="label">料金</span>${escHTML(shop.perPlay)}</div>
        <div><span class="label">機種</span>${escHTML(shop.machines)}</div>
      </div>
      ${badges.length ? `<div class="shop-card-badges">${badges.join('')}</div>` : ''}

function renderFavDetail() {

  const tab = state.favScoreTab;
  const games = [
    { id: '01', label: '01ゲーム' },
    { id: 'cricket', label: 'クリケット' },
    { id: 'countup', label: 'カウントアップ' },
  ];

  const scores = (fav?.scores[tab] || []).slice().sort((a, b) => b.value - a.value);

  return `
    ${renderTopbar()}
    <main class="screen">
      <button class="back-btn" onclick="goBack()">戻る</button>

          <input type="number" placeholder="スコアを入力" id="score-input" min="0" />

        </div>

            <p style="font-size:13px;color:var(--bg-stone);text-align:center;padding:16px 0;">
              まだスコアが登録されていません

              <span class="score-rank ${i === 0 ? 'gold' : ''}">${i + 1}</span>

  `;

  if (!val || isNaN(val) || val < 0) {
    alert('正しいスコアを入力してください');
    return;
  }
  addScore(shopId, gameType, val);
  input.value = '';
  render();
}

        <h3 style="font-family:'Shippori Mincho',serif;font-size:16px;font-weight:600;margin-top:8px;padding-bottom:6px;border-bottom:1px dashed var(--ink-soft);letter-spacing:0.1em;">マイダーツ・セットアップ</h3>

        <div class="form-group">
          <label>バレル</label>
          <input type="text" value="${escHTML(a.barrel)}" oninput="state.account.barrel=this.value; saveState()" placeholder="例: TARGET Solo 18g" />
        </div>
        <div class="form-group">
          <label>フライト</label>
          <input type="text" value="${escHTML(a.flight)}" oninput="state.account.flight=this.value; saveState()" placeholder="例: L-Style Champagne" />
        </div>
        <div class="form-group">
          <label>チップ</label>
          <input type="text" value="${escHTML(a.tip)}" oninput="state.account.tip=this.value; saveState()" placeholder="例: Fit Point Plus" />
        </div>
        <div class="form-group">
          <label>ケース</label>
          <input type="text" value="${escHTML(a.case)}" oninput="state.account.case=this.value; saveState()" placeholder="例: CAMEO Pita 3" />
        </div>
        <div class="form-group">
          <label>ダーツカード</label>
          <input type="text" value="${escHTML(a.dartsCard)}" oninput="state.account.dartsCard=this.value; saveState()" placeholder="例: DARTSLIVE CARD #..." />
        </div>
      </div>
      <p class="note">入力内容は端末内に自動保存されます。プロフィールは他のユーザーからも閲覧可能です。</p>
    </main>
    ${renderBottomNav()}
  `;
}

function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    state.account.photo = e.target.result;
    saveState();
    render();
  };
  reader.readAsDataURL(file);
}

// ---------- 画面: お問い合わせ ----------
function renderContact() {
  return `
    ${renderTopbar()}
    <main class="screen">
      <button class="back-btn" onclick="goBack()">戻る</button>
      <div class="section-header">
        <h2>お問い合わせ</h2>
        <div class="subtitle">CONTACT US</div>
      </div>
      <p style="font-size:14px;line-height:1.8;text-align:center;padding:0 8px;">
        バグ報告・システムへのご意見・<br/>その他お問い合わせはこちらから。
      </p>
      <div class="form-group">
        <label>件名</label>
        <input type="text" id="contact-subject" placeholder="例: バグ報告" />
      </div>
      <div class="form-group">
        <label>本文</label>
        <textarea id="contact-body" placeholder="お問い合わせ内容を入力してください…"></textarea>
      </div>
      <button class="btn-primary" onclick="sendContact()">メールアプリで送信</button>
      <p class="note">
        ボタンを押すと端末のメールアプリが起動し、<br/>
        <strong style="color:var(--teal-deep)">inf.wayr@gmail.com</strong> 宛にメッセージを送信できます。
      </p>
    </main>
    ${renderBottomNav()}
  `;
}

function sendContact() {
  const subject = $('#contact-subject').value || 'DOKODARTS お問い合わせ';
  const body = $('#contact-body').value || '';
  if (!body.trim()) { alert('本文を入力してください'); return; }
  const url = `mailto:inf.wayr@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = url;
}

// ---------- ナビゲーション ----------
function navigate(screen) {
  if (state.screen !== screen) {
    state.history.push(screen);
    if (state.history.length > 20) state.history.shift();
  }
  state.screen = screen;
  state.drawerOpen = false;
  window.scrollTo(0, 0);
  render();
}

function goBack() {
  if (state.history.length > 1) {
    state.history.pop();
    state.screen = state.history[state.history.length - 1];
  } else {
    state.screen = 'home';
    state.history = ['home'];
  }
  state.drawerOpen = false;
  window.scrollTo(0, 0);
  render();
}

function openDrawer() { state.drawerOpen = true; render(); }
function closeDrawer() { state.drawerOpen = false; render(); }

// ---------- メインレンダラ ----------
function render() {
  const app = $('#app');
  let html = '';
  switch (state.screen) {
    case 'home': html = renderHome(); break;
    case 'station': html = renderStation(); break;
    case 'fee': html = renderFee(); break;
    case 'condition': html = renderCondition(); break;
    case 'results': html = renderResults(); break;
    case 'detail': html = renderDetail(); break;
    case 'favorites': html = renderFavorites(); break;
    case 'favDetail': html = renderFavDetail(); break;
    case 'account': html = renderAccount(); break;
    case 'contact': html = renderContact(); break;
    default: html = renderHome();
  }
  html += renderDrawer();
  app.innerHTML = html;
  // 画面種別をbodyに反映（CSSの可読性スタイル切替用）
  document.body.dataset.screen = state.screen;
}

// ---------- 起動 ----------
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  render();
});

// グローバル公開（インラインハンドラから呼ぶため）
window.navigate = navigate;
window.goBack = goBack;
window.openDrawer = openDrawer;
window.closeDrawer = closeDrawer;
window.searchByName = searchByName;
window.searchByStation = searchByStation;
window.searchByFee = searchByFee;
window.searchByCondition = searchByCondition;
window.toggleDay = toggleDay;
window.showDetail = showDetail;
window.toggleFavAndRender = toggleFavAndRender;
window.openFavDetail = openFavDetail;
window.submitScore = submitScore;
window.uploadPhoto = uploadPhoto;
window.sendContact = sendContact;
window.render = render;
window.state = state;
window.saveState = saveState;

  </script>
  <script>
    (function() {
      function boot() {
        try {
          if (typeof loadState === 'function') loadState();
          if (typeof render === 'function') render();
        } catch (e) {
          console.error('boot error', e);
          var app = document.getElementById('app');
          if (app) app.innerHTML = '<div style="padding:40px 20px;color:#f5f1e8;text-align:center;background:rgba(15,22,32,0.7);margin:80px 20px;border-radius:14px;font-family:serif;"><h2>読み込みエラー</h2><pre style="font-size:11px;text-align:left;overflow:auto;margin-top:12px;color:#ffb;">' + (e && e.message ? e.message : e) + '</pre></div>';
        }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
      else boot();
      setTimeout(function() { var s = document.getElementById('splash'); if (s) s.remove(); }, 2000);
    })();
  </script>
</body>
</html>
